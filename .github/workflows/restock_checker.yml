name: Pokémon Restock Checker

on:
  schedule:
    # Runs every hour — adjust timing if you want more/less frequent checks
    # Format: minute hour day month weekday (UTC time)
    - cron: "0 * * * *"
  workflow_dispatch:  # also allows manual trigger from GitHub UI

jobs:
  check-stock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Restore last known state
        uses: actions/cache@v4
        with:
          path: last_state.json
          key: restock-state-${{ github.run_id }}
          restore-keys: |
            restock-state-

      - name: Run restock checker
        env:
          NOTIFY_EMAIL:  ${{ secrets.NOTIFY_EMAIL }}
          SMTP_EMAIL:    ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python checker.py

      - name: Save updated state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_state.json
          key: restock-state-${{ github.run_id }}
